appId: com.labelstudiokh.app
productName: Label Studio KH
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - resources/**/*
  - package.json
asarUnpack:
  - resources/fonts/**

mac:
  category: public.app-category.productivity
  icon: resources/icon.png
  # Force the arch suffix into every Mac DMG filename. Without this,
  # electron-builder gives the "primary" arch no suffix, producing one
  # arm64-suffixed file and one un-suffixed file — confusing on the
  # Releases page where users scan filenames to pick the right download.
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - target: dmg
      # Build BOTH Apple Silicon (arm64) and Intel (x64) Macs. Intel Macs
      # (2020 and earlier) can't install an arm64-only DMG. Doubles output
      # size — two ~200MB DMGs end up in dist/ — but covers ~25% more Mac
      # users. To rebuild faster during local iteration, drop x64 here.
      arch: [arm64, x64]
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null # unsigned build. To sign: fill in a Developer ID Application
                 # cert (CSC_LINK env var or this field) + set notarize: true.
dmg:
  title: Label Studio KH ${version}
  background: null
  iconSize: 100
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  icon: resources/icon.png
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

# Publish config for both the auto-updater AND `electron-builder --publish`
# uploads. Provider: github → electron-updater fetches updates from the repo's
# Releases feed, no auth needed (public repo).
#
# To go live:
#   1. Create the public GitHub repo (any name, e.g. label-studio-kh).
#   2. Replace theng12 below with your GitHub username / org.
#   3. Replace label-studio-kh with the repo name.
#   4. Run: GH_TOKEN=ghp_… npm run build:all -- --publish always
#      (token only needed at upload time, not at user install time).
publish:
  provider: github
  owner: theng12
  repo: label-studio-kh
  # `private: false` is the default; explicit for clarity. With a public repo
  # the auto-updater reads the Releases feed anonymously — no token needed
  # on user machines.
  private: false
  # Treats every Release as a stable channel. If we ever do prereleases,
  # add a separate "beta" channel and gate via electron-updater config.
  releaseType: release
