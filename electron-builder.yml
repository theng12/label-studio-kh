appId: com.labelstudiokh.app
productName: Label Studio KH
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - resources/**/*
  - package.json
asarUnpack:
  - resources/fonts/**

mac:
  category: public.app-category.productivity
  icon: resources/icon.png
  target:
    - target: dmg
      arch: [arm64]
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null # unsigned build
dmg:
  title: Label Studio KH ${version}
  background: null
  iconSize: 100
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  icon: resources/icon.png
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
